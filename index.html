<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="이음어린이집 월별 당직표를 캘린더 형식으로 확인하는 웹앱"
    />
    <title>이음어린이집 캘린더</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <img
          class="brand-logo"
          src="./assets/ieum-kindergarten.png"
          alt="이음어린이집"
        />
        <div class="month-badge" aria-label="2026년 7월">
          <span>2026</span>
          <strong>07</strong>
        </div>
      </header>

      <main class="layout">
        <section class="calendar-panel" aria-label="월간 캘린더">
          <div class="calendar-toolbar">
            <div class="calendar-tabs" role="tablist" aria-label="캘린더 종류">
              <button
                class="tab-button is-active"
                type="button"
                role="tab"
                aria-selected="true"
                data-view="duty"
              >
                당직표
              </button>
              <button
                class="tab-button"
                type="button"
                role="tab"
                aria-selected="false"
                data-view="events"
              >
                일정표
              </button>
            </div>
            <div class="legend" id="slotLegend" aria-label="범례">
              <span class="legend-item morning-one">
                <i class="legend-dot"></i>
                <strong>오전1</strong>
                <small>07:30 ~ 09:00</small>
              </span>
              <span class="legend-item morning-two">
                <i class="legend-dot"></i>
                <strong>오전2</strong>
                <small>08:00 ~ 09:00</small>
              </span>
              <span class="legend-item afternoon">
                <i class="legend-dot"></i>
                <strong>오후</strong>
                <small>09:30 ~ 18:30</small>
              </span>
            </div>
          </div>
          <div class="weekdays" aria-hidden="true">
            <span>일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span>토</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
